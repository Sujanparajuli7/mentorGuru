<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorGuru | Staff Authentication</title>
    <meta name="description" content="MentorGuru admin login portal. Secure access for staff and administrators.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Subtle red background accent -->
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-600 to-red-400"></div>
    <div class="absolute w-[500px] h-[500px] rounded-full bg-red-50 blur-[120px] top-[-100px] right-[-100px] pointer-events-none opacity-60"></div>
    <div class="absolute w-[400px] h-[400px] rounded-full bg-red-50 blur-[100px] bottom-[-80px] left-[-80px] pointer-events-none opacity-40"></div>

    <!-- Login Card -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8 z-10 relative">

        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-red-600 to-red-500 text-white text-2xl mb-5 shadow-lg shadow-red-200">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-gray-900">Mentor<span class="text-red-600">Guru</span> Console</h1>
            <p class="text-sm text-gray-500 mt-1.5">Enter your credentials to access the admin dashboard</p>
        </div>

        <!-- Error Alert -->
        <div id="errorAlert" class="hidden mb-5 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm flex items-center gap-3">
            <i class="fa-solid fa-circle-exclamation text-red-500"></i>
            <span id="errorMessage">Invalid email or password.</span>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-5" novalidate>

            <div>
                <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="email" class="w-full pl-10 pr-4 py-3 rounded-xl glass-input text-sm" placeholder="suzzan@gmail.com" required>
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" class="w-full pl-10 pr-11 py-3 rounded-xl glass-input text-sm" placeholder="••••••••" required>
                    <button type="button" id="togglePasswordBtn" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-600 transition">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="pt-1">
                <button type="submit" class="btn-red w-full py-3.5 px-4 rounded-xl text-sm font-semibold">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i> Sign In to Dashboard
                </button>
            </div>
        </form>

        <!-- Footer link -->
        <div class="mt-7 pt-6 border-t border-gray-100 text-center">
            <a href="index.html" class="text-xs text-gray-400 hover:text-red-600 transition inline-flex items-center gap-1.5">
                <i class="fa-solid fa-arrow-left text-[10px]"></i> Return to Public Website
            </a>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('mentorGuruAdmin') === 'true') {
            window.location.href = 'admin.html';
        }

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');

        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePasswordBtn.querySelector('i').className = type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            errorAlert.classList.add('hidden');
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showError('Please fill out all credential fields.');
                return;
            }

            if (email === 'suzzan@gmail.com' && password === 'Suzzan') {
                sessionStorage.setItem('mentorGuruAdmin', 'true');
                window.location.href = 'admin.html';
            } else {
                showError('Authentication failed. Check your email or password.');
            }
        });

        function showError(msg) {
            errorMessage.textContent = msg;
            errorAlert.classList.remove('hidden');
        }
    </script>
</body>
</html>
